<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <!-- favicon -->
  <link rel="icon" type="image/png" href="images\Frutiger-Aero-Minimalist-Typographic-Approach-PNG-thumb_birefnet.png">
</head>
<body>

  <!-- Background wrapper for side panels -->
  <div class="background-wrapper">
    <img class="background-image" src="images/lower_qual_back_frut.jfif" alt="Background">
  </div>

  <!-- Main content wrapper -->
  <div class="content-wrapper">
    <header>
      <h1>Welcome to My Portfolio</h1>
      <p>Creative Developer & Designer</p>
    </header>

    <section id="about">
      <h2>About Me</h2>
      <p>about...</p>
    </section>

    <section id="projects">
      <h2>Projects</h2>
      <div class="project">Project 1</div>
      <div class="project">Project 2</div>
    </section>

    <section id="contact">
      <h2>Contact</h2>
      <p>Email or linkedin</p>
    </section>
  </div>

  <!-- Entrance sound -->
  <audio id="entranceSound" preload="auto">
    <source src="sounds\frutiger-aero-sound.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <!-- Looping background music -->
  <audio id="bgMusic" loop preload="auto">
    <source src="music\takeshi abo - LEASE (extended).mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <!-- Music control button -->
  <button id="musicControl" class="music-control" style="display: none;">
    🔇 Music Off
  </button>

  <!-- Link to external JavaScript file -->
  <script src="script.js"></script>

</body>
</html>
